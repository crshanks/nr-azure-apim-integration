server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Inject runtime config as a JS file served from /config.js
    # This avoids baking secrets into the HTML at build time.
    location /config.js {
        default_type application/javascript;
        return 200 "window.APIM_ENDPOINT='${APIM_ENDPOINT}'; window.NR_LICENSE_KEY='${NR_LICENSE_KEY}';";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
