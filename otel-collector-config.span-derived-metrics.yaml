# OpenTelemetry Collector Configuration — Span-Derived Metrics variant
# Deployed in Azure Container Instances (ACI) when enableSpanMetrics=true.
#
# Pipeline:
#   azure_event_hub receiver (traces)
#     → transform/spanstatus (set OTel span status from HTTP status code)
#     → transform/semconv     (rename APIM attributes to OTel HTTP semantic conventions)
#     → otlp_http exporter (New Relic) [traces]
#     → signal_to_metrics connector (emit OTel-spec http.server.request.duration histogram)
#         → otlp_http exporter (New Relic) [metrics]
#
# Why this exists:
#   The default config exports traces only. New Relic's APM list view populates
#   Throughput / Response Time / Error Rate from OTel-semantic-convention metric
#   `http.server.request.duration`. Spans alone do not drive that UI. This variant
#   uses the `signaltometrics` connector to emit the exact metric the APM UI
#   consumes, so APIM API entities show golden metrics alongside the customer's
#   eBPF and APM-agent-instrumented services.
#
# Why signal_to_metrics rather than spanmetrics:
#   The `spanmetrics` connector only supports a `namespace` prefix on its output
#   (e.g. `traces.span.metrics.duration`). It cannot produce the exact metric
#   name `http.server.request.duration` that the New Relic APM UI consumes.
#   `signal_to_metrics` is the OTel-native, declarative way to emit semantic-
#   convention metrics from spans, and so is the better fit here.
#
# Customers using Azure-native OTel metrics or the New Relic Azure Monitor
# integration should leave enableSpanMetrics=false (the default), which uses
# otel-collector-config.yaml instead.
#
# The azure_event_hub receiver uses format: "azure". The APIM policy wraps the
# payload in {"records":[...]} using Azure Application Insights AppRequests field
# names. The receiver maps these directly to OTel span fields:
#
#   OperationId  → trace.id
#   Id           → span.id
#   ParentId     → span.parentSpanId
#   Name         → span.name
#   AppRoleName  → service.name (resource attribute)
#   DurationMs   → end_time = start_time + DurationMs
#   ResultCode   → http.response.status_code (attribute)
#   Url          → http.url (attribute)
#   Properties["HTTP Method"] → http.method (attribute)
#
# Environment variables required:
#   NEW_RELIC_LICENSE_KEY     : New Relic ingest license key (40 chars)
#   AZURE_EVENTHUB_CONNECTION : SAS connection string with EntityPath

receivers:
  azure_event_hub:
    connection: "${env:AZURE_EVENTHUB_CONNECTION}"
    format: "azure"
    storage: file_storage

processors:
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25

  batch:
    send_batch_size: 1000
    timeout: 10s

  # Derive OTel span status from http.response.status_code so signaltometrics
  # (and downstream consumers) can identify errors. The azure_event_hub receiver
  # sets the HTTP attribute but leaves span.status_code as UNSET.
  transform/spanstatus:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - set(span.status.code, STATUS_CODE_ERROR) where span.attributes["http.response.status_code"] != nil and Int(span.attributes["http.response.status_code"]) >= 400

  # Rename the receiver-emitted attribute `http.method` to the OTel HTTP
  # semantic-convention attribute `http.request.method`. New Relic's APM UI
  # uses the semconv name as a metric dimension, so this normalisation makes
  # the dimension consistent across APIM-derived metrics and metrics from
  # APM-agent-instrumented backends.
  transform/semconv:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - set(span.attributes["http.request.method"], span.attributes["http.method"]) where span.attributes["http.method"] != nil and span.attributes["http.request.method"] == nil

connectors:
  # Emit OTel HTTP semantic-convention metrics from spans. The histogram
  # http.server.request.duration is what New Relic's APM UI consumes to
  # populate Throughput, Response Time, and Error Rate columns for the
  # APIM API entities.
  signal_to_metrics:
    error_mode: ignore
    spans:
      - name: http.server.request.duration
        description: Duration of HTTP server requests
        unit: s
        include_resource_attributes:
          - key: service.name
        attributes:
          - key: http.request.method
            default_value: GET
          - key: http.response.status_code
            default_value: "0"
        histogram:
          buckets: [0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5, 5, 10]
          # value is in seconds — span duration in nanoseconds / 1e9
          value: Double(end_time_unix_nano - start_time_unix_nano) / 1000000000.0

exporters:
  otlp_http/newrelic:
    endpoint: "https://otlp.nr-data.net:4318"
    headers:
      api-key: "${env:NEW_RELIC_LICENSE_KEY}"
    compression: gzip
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 1000

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"
  file_storage:
    directory: /var/lib/otelcol/checkpoints
    create_directory: true

service:
  extensions: [health_check, file_storage]
  pipelines:
    traces:
      receivers:  [azure_event_hub]
      processors: [memory_limiter, transform/spanstatus, transform/semconv, batch]
      exporters:  [signal_to_metrics, otlp_http/newrelic]
    metrics/span_derived:
      receivers:  [signal_to_metrics]
      processors: [batch]
      exporters:  [otlp_http/newrelic]
  telemetry:
    logs:
      level: "info"
    # Collector internal metrics exported directly to New Relic.
    # These appear as otelcol_* metrics in New Relic and cover queue depth,
    # spans accepted/refused, exporter success/failure, and memory usage.
    # Container logs (stdout) are captured separately by the Log Analytics
    # diagnostic setting, providing a safety net if the collector itself is down.
    metrics:
      readers:
        - periodic:
            interval: 60000  # ms — emit every 60 seconds
            exporter:
              otlp:
                protocol: http/protobuf
                endpoint: "https://otlp.nr-data.net:4318"
                headers:
                  api-key: "${env:NEW_RELIC_LICENSE_KEY}"
